<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nico Refrigeración | Service Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Barra de Navegación -->
    <nav class="sticky top-0 bg-white/90 backdrop-blur-sm border-b border-slate-100 p-4 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold text-xl text-blue-900">NICO</span>
            <a href="https://wa.me/5491172446640" class="bg-green-600 text-white px-5 py-2 rounded-full font-medium hover:bg-green-700 transition">WhatsApp</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 mt-8">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Nico Refrigeración</h1>
            <p class="text-lg text-slate-600">Servicio Técnico Especializado</p>
        </header>

        <!-- Servicios -->
        <div class="grid md:grid-cols-3 gap-6 mb-12">
            <div class="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm text-center">
                <div class="text-5xl mb-4">❄️</div>
                <h3 class="font-bold mb-2">Aires Acondicionados</h3>
            </div>
            <div class="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm text-center">
                <div class="text-5xl mb-4">🧊</div>
                <h3 class="font-bold mb-2">Heladeras y Freezers</h3>
            </div>
            <div class="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm text-center">
                <div class="text-5xl mb-4">⚙️</div>
                <h3 class="font-bold mb-2">Lavarropas</h3>
            </div>
        </div>

        <!-- Formulario de Turnos -->
        <section id="turno" class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
            <h2 class="text-2xl font-bold mb-6">Solicitar Turno</h2>
            <form id="turnoForm" class="space-y-4">
                <select id="equipo" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200">
                    <option value="Aire Acondicionado">Aire Acondicionado</option>
                    <option value="Heladera/Freezer">Heladera/Freezer</option>
                    <option value="Lavarropas">Lavarropas</option>
                </select>
                <input type="date" id="fecha" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200">
                <select id="horario" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200">
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                </select>
                <input type="text" id="direccion" placeholder="Dirección completa (Calle y Altura)" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200">
                <textarea id="problema" placeholder="Breve descripción del problema" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-200"></textarea>
                <button type="submit" class="w-full bg-blue-900 text-white p-4 rounded-xl font-bold hover:bg-blue-800 transition">Confirmar por WhatsApp</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
